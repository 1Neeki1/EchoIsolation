<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Эхо Изоляции</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
  }
}
</script>

</head>

<body>

<div id="menu">
    <h1>ЭХО ИЗОЛЯЦИИ</h1>
    <p>Станция Восток-12</p>
    <button id="startBtn">НАЧАТЬ</button>
</div>

<div id="hud">

<div class="hud-block">
    <span>ПАНИКА</span>
    <div class="bar">
        <div id="panicFill"></div>
    </div>
</div>

<div class="hud-block">
    <span>БАТАРЕЯ</span>
    <div class="bar">
        <div id="batteryFill"></div>
    </div>
</div>

<div id="objective">
    Найти источник сигнала...
</div>

</div>

<div id="message"></div>

<div id="crosshair"></div>

<script type="module" src="src/core/game.js"></script>

</body>
</html>
